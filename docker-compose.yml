version: '3.8'
services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      SA_PASSWORD: 'YourPassword123!'
      ACCEPT_EULA: 'Y'
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
  api:
    build: .
    ports:
      - "5000:80"
    environment:
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=CSharpAuDb;User Id=sa;Password=YourPassword123!;Encrypt=false;TrustServerCertificate=true;"
    depends_on:
      - sqlserver
volumes:
  sqlserver_data: